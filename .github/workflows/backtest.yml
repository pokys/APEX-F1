name: Backtest Simulation

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Season year to evaluate (e.g. 2025)"
        required: false
        type: string
      simulations:
        description: "Simulations per race (e.g. 2000)"
        required: false
        type: string
  schedule:
    - cron: "20 6 * * 1"
  push:
    paths:
      - "pipeline/backtest_simulation.py"
      - "pipeline/simulate_race.py"
      - "config/track_profiles.json"
      - "models/*.json"
      - "data/raw/fastf1/*.json"
      - "requirements.lock"
      - ".github/workflows/backtest.yml"

permissions:
  contents: write

concurrency:
  group: bot-outputs
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Run backtest
        env:
          SEASON: ${{ github.event.inputs.season }}
          SIMULATIONS: ${{ github.event.inputs.simulations }}
        run: |
          TARGET_SEASON="${SEASON:-2025}"
          TARGET_SIMS="${SIMULATIONS:-2000}"
          python pipeline/backtest_simulation.py --season "$TARGET_SEASON" --simulations "$TARGET_SIMS" --log-level INFO

      - name: Commit report
        run: bash scripts/commit_bot_outputs.sh "Update simulation backtest report" outputs/backtest
