name: Backtest Simulation

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Season year to evaluate (e.g. 2025)"
        required: false
        type: string
      simulations:
        description: "Simulations per race (e.g. 2000)"
        required: false
        type: string
  schedule:
    - cron: "20 6 * * 1"
  push:
    paths:
      - "pipeline/backtest_simulation.py"
      - "pipeline/simulate_race.py"
      - "config/track_profiles.json"
      - "models/*.json"
      - "data/raw/fastf1/*.json"
      - ".github/workflows/backtest.yml"

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest
        env:
          SEASON: ${{ github.event.inputs.season }}
          SIMULATIONS: ${{ github.event.inputs.simulations }}
        run: |
          TARGET_SEASON="${SEASON:-2025}"
          TARGET_SIMS="${SIMULATIONS:-2000}"
          python pipeline/backtest_simulation.py --season "$TARGET_SEASON" --simulations "$TARGET_SIMS" --log-level INFO

      - name: Commit report
        run: |
          if [ -z "$(git status --porcelain -- outputs/backtest)" ]; then
            echo "No backtest report changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- outputs/backtest
          git commit -m "Update simulation backtest report"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "git push failed (attempt $attempt), retrying after rebase..."
              git pull --rebase || true
              sleep $((attempt * 7))
            fi
          done
          echo "git push failed after 3 attempts."
          exit 1
