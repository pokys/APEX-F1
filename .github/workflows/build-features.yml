name: Build Features

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Season year (e.g. 2026)"
        required: false
        type: string
  push:
    paths:
      - "pipeline/build_features.py"
      - "data/raw/fastf1/**"
      - "knowledge/processed/**"
      - "config/signal_guardrails.json"
      - "config/recency.json"
      - "requirements.lock"
      - ".github/workflows/build-features.yml"
  schedule:
    - cron: "10 5 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build feature dataset
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
      - name: Run feature build
        env:
          SEASON: ${{ github.event.inputs.season }}
        run: |
          ARGS=()
          if [ -n "$SEASON" ]; then
            ARGS+=(--season "$SEASON")
          fi
          python pipeline/validate_signals.py --signals-dir knowledge/processed --allow-empty --log-level INFO
          python pipeline/build_features.py "${ARGS[@]}" --guardrails-config config/signal_guardrails.json --recency-config config/recency.json --allow-missing-fastf1 --log-level INFO

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain -- data/processed)" ]; then
            echo "No processed feature changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- data/processed
          git commit -m "Update processed feature dataset"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "git push failed (attempt $attempt), retrying after rebase..."
              git pull --rebase || true
              sleep $((attempt * 7))
            fi
          done
          echo "git push failed after 3 attempts."
          exit 1
