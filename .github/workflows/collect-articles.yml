name: Collect F1 Articles

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"
  push:
    paths:
      - "pipeline/collect_articles.py"
      - "knowledge/feeds.yaml"
      - "requirements.lock"
      - ".github/workflows/collect-articles.yml"

permissions:
  contents: write

concurrency:
  group: bot-outputs
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Collect articles
        run: |
          python pipeline/collect_articles.py \
            --feeds knowledge/feeds.yaml \
            --inbox knowledge/inbox/articles.md \
            --log-level INFO

      - name: Commit changes
        run: bash scripts/commit_bot_outputs.sh "Update F1 article inbox" knowledge/inbox/articles.md
