name: Collect F1 Articles

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"
  push:
    paths:
      - "pipeline/collect_articles.py"
      - "knowledge/feeds.yaml"
      - "requirements.lock"
      - ".github/workflows/collect-articles.yml"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Collect articles
        run: |
          python pipeline/collect_articles.py \
            --feeds knowledge/feeds.yaml \
            --inbox knowledge/inbox/articles.md \
            --log-level INFO

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain -- knowledge/inbox/articles.md)" ]; then
            echo "No article inbox changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- knowledge/inbox/articles.md
          git commit -m "Update F1 article inbox"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "git push failed (attempt $attempt), retrying after rebase..."
              git pull --rebase || true
              sleep $((attempt * 7))
            fi
          done
          echo "git push failed after 3 attempts."
          exit 1
