name: Deploy Prediction Page

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "outputs/prediction_report.html"
      - "outputs/prediction.json"
      - "outputs/prediction_dry.json"
      - "outputs/prediction_wet.json"
      - "config/race_config.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_run:
    workflows:
      - Full Prediction Pipeline
      - Simulate Race
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare static site
        run: |
          mkdir -p _site

          if [ ! -f outputs/prediction_report.html ]; then
            echo "Missing outputs/prediction_report.html"
            exit 1
          fi

          cp outputs/prediction_report.html _site/index.html
          cp outputs/prediction_report.html _site/prediction_report.html

          if [ -f outputs/prediction.json ]; then
            cp outputs/prediction.json _site/prediction.json
          fi
          if [ -f outputs/prediction_dry.json ]; then
            cp outputs/prediction_dry.json _site/prediction_dry.json
          fi
          if [ -f outputs/prediction_wet.json ]; then
            cp outputs/prediction_wet.json _site/prediction_wet.json
          fi

          if [ -f config/race_config.json ]; then
            cp config/race_config.json _site/race_config.json
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
