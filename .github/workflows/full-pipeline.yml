name: Full Prediction Pipeline

on:
  schedule:
    # Race Weekend Mode: Every hour from Thursday to Sunday
    - cron: "0 * * * 4,5,6,0"
    # Weekday Mode: Every 4 hours from Monday to Wednesday
    - cron: "0 */4 * * 1,2,3"
  workflow_dispatch:
    inputs:
      season:
        description: "Season year (optional)"
        required: false
        type: string
      sessions:
        description: "Session list for ingest (optional, e.g. Q,R)"
        required: false
        type: string
      cutoff_date:
        description: "Cutoff YYYY-MM-DD (optional)"
        required: false
        type: string
      fixed_grid:
        description: "Comma-separated driver abbreviations (e.g. VER,RUS,LEC). Overrides auto-detection."
        required: false
        type: string
  push:
    paths:
      - "knowledge/processed/**"
      - ".github/workflows/full-pipeline.yml"
      - "pipeline/*.py"
      - "config/race_config.json"
      - "config/track_profiles.json"
      - "config/signal_guardrails.json"
      - "requirements.txt"
      - "requirements.lock"

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Run article collection
        run: |
          python pipeline/collect_articles.py --log-level INFO

      - name: Run FastF1 ingest
        env:
          SEASON: ${{ github.event.inputs.season }}
          SESSIONS: ${{ github.event.inputs.sessions }}
          CUTOFF_DATE: ${{ github.event.inputs.cutoff_date }}
        run: |
          TARGET_SEASON="${SEASON:-$(date -u +%Y)}"
          ARGS=()
          ARGS+=(--season "$TARGET_SEASON")
          if [ -n "$SESSIONS" ]; then
            ARGS+=(--sessions "$SESSIONS")
          fi
          if [ -n "$CUTOFF_DATE" ]; then
            ARGS+=(--cutoff-date "$CUTOFF_DATE")
          fi
          python pipeline/ingest_fastf1.py "${ARGS[@]}" --log-level INFO

      - name: Select next GP config
        env:
          SEASON: ${{ github.event.inputs.season }}
          CUTOFF_DATE: ${{ github.event.inputs.cutoff_date }}
        run: |
          TARGET_SEASON="${SEASON:-$(date -u +%Y)}"
          AS_OF_DATE="${CUTOFF_DATE:-$(date -u +%F)}"
          python pipeline/select_next_gp.py --season "$TARGET_SEASON" --as-of-date "$AS_OF_DATE" --race-config config/race_config.json --log-level INFO

      - name: Validate processed signals
        run: |
          python pipeline/validate_signals.py --signals-dir knowledge/processed --allow-empty --log-level INFO

      - name: Build features
        env:
          SEASON: ${{ github.event.inputs.season }}
        run: |
          TARGET_SEASON="${SEASON:-$(date -u +%Y)}"
          ARGS=()
          ARGS+=(--season "$TARGET_SEASON")
          python pipeline/build_features.py "${ARGS[@]}" --guardrails-config config/signal_guardrails.json --allow-missing-fastf1 --log-level INFO

      - name: Update ratings
        env:
          SEASON: ${{ github.event.inputs.season }}
        run: |
          TARGET_SEASON="${SEASON:-$(date -u +%Y)}"
          ARGS=()
          ARGS+=(--season "$TARGET_SEASON")
          python pipeline/update_ratings.py "${ARGS[@]}" --guardrails-config config/signal_guardrails.json --allow-missing-features --log-level INFO

      - name: Apply backtest calibration
        env:
          SEASON: ${{ github.event.inputs.season }}
        run: |
          TARGET_SEASON="${SEASON:-$(date -u +%Y)}"
          python pipeline/apply_backtest_calibration.py --season "$TARGET_SEASON" --race-config config/race_config.json --allow-missing-report --log-level INFO

      - name: Simulate dry and wet scenarios
        env:
          FIXED_GRID: ${{ github.event.inputs.fixed_grid }}
        run: |
          ARGS=()
          if [ -n "$FIXED_GRID" ]; then
            ARGS+=(--fixed-grid "$FIXED_GRID")
          fi
          python pipeline/simulate_weather_scenarios.py "${ARGS[@]}" --allow-missing-models --log-level INFO

      - name: Publish prediction
        run: |
          python pipeline/publish_prediction.py --input outputs/prediction_dry.json --output outputs/prediction_dry.json --allow-missing-input --log-level INFO
          python pipeline/publish_prediction.py --input outputs/prediction_wet.json --output outputs/prediction_wet.json --allow-missing-input --log-level INFO
          python pipeline/publish_prediction.py --allow-missing-input --log-level INFO

      - name: Render prediction page
        run: |
          python pipeline/render_prediction_page.py --prediction outputs/prediction.json --prediction-dry outputs/prediction_dry.json --prediction-wet outputs/prediction_wet.json --race-config config/race_config.json --output outputs/prediction_report.html --allow-missing-input --log-level INFO

      - name: Validate outputs
        run: |
          python pipeline/validate_outputs.py --log-level INFO

      - name: Commit changes
        run: |
          # Clear inbox after successful run to avoid re-processing old articles
          echo "# F1 Article Inbox" > knowledge/inbox/articles.md

          if [ -z "$(git status --porcelain -- knowledge/inbox/articles.md knowledge/processed data/raw/fastf1 data/processed models outputs/prediction.json outputs/prediction_dry.json outputs/prediction_wet.json outputs/prediction_report.html config/race_config.json)" ]; then
            echo "No pipeline output changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- knowledge/inbox/articles.md knowledge/processed data/raw/fastf1 data/processed models outputs/prediction.json outputs/prediction_dry.json outputs/prediction_wet.json outputs/prediction_report.html config/race_config.json
          git commit -m "Run full F1 prediction pipeline"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "git push failed (attempt $attempt), retrying after rebase..."
              git pull --rebase || true
              sleep $((attempt * 7))
            fi
          done
          echo "git push failed after 3 attempts."
          exit 1
