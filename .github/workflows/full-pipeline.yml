name: Full Prediction Pipeline

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Season year (optional)"
        required: false
        type: string
      sessions:
        description: "Session list for ingest (optional, e.g. Q,R)"
        required: false
        type: string
      cutoff_date:
        description: "Cutoff YYYY-MM-DD (optional)"
        required: false
        type: string
  push:
    paths:
      - "knowledge/processed/**"
      - ".github/workflows/full-pipeline.yml"
      - "pipeline/*.py"
      - "config/race_config.json"
      - "requirements.txt"

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run article collection
        run: |
          python pipeline/collect_articles.py --log-level INFO

      - name: Run FastF1 ingest
        env:
          SEASON: ${{ github.event.inputs.season }}
          SESSIONS: ${{ github.event.inputs.sessions }}
          CUTOFF_DATE: ${{ github.event.inputs.cutoff_date }}
        run: |
          TARGET_SEASON="${SEASON:-$(date -u +%Y)}"
          ARGS=()
          ARGS+=(--season "$TARGET_SEASON")
          if [ -n "$SESSIONS" ]; then
            ARGS+=(--sessions "$SESSIONS")
          fi
          if [ -n "$CUTOFF_DATE" ]; then
            ARGS+=(--cutoff-date "$CUTOFF_DATE")
          fi
          python pipeline/ingest_fastf1.py "${ARGS[@]}" --log-level INFO

      - name: Select next GP config
        env:
          SEASON: ${{ github.event.inputs.season }}
          CUTOFF_DATE: ${{ github.event.inputs.cutoff_date }}
        run: |
          TARGET_SEASON="${SEASON:-$(date -u +%Y)}"
          AS_OF_DATE="${CUTOFF_DATE:-$(date -u +%F)}"
          python pipeline/select_next_gp.py --season "$TARGET_SEASON" --as-of-date "$AS_OF_DATE" --race-config config/race_config.json --log-level INFO

      - name: Build features
        env:
          SEASON: ${{ github.event.inputs.season }}
        run: |
          TARGET_SEASON="${SEASON:-$(date -u +%Y)}"
          ARGS=()
          ARGS+=(--season "$TARGET_SEASON")
          python pipeline/build_features.py "${ARGS[@]}" --allow-missing-fastf1 --log-level INFO

      - name: Update ratings
        env:
          SEASON: ${{ github.event.inputs.season }}
        run: |
          TARGET_SEASON="${SEASON:-$(date -u +%Y)}"
          ARGS=()
          ARGS+=(--season "$TARGET_SEASON")
          python pipeline/update_ratings.py "${ARGS[@]}" --allow-missing-features --log-level INFO

      - name: Simulate race
        run: |
          python pipeline/simulate_race.py --allow-missing-models --log-level INFO

      - name: Publish prediction
        run: |
          python pipeline/publish_prediction.py --allow-missing-input --log-level INFO

      - name: Validate outputs
        run: |
          python pipeline/validate_outputs.py --log-level INFO

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain -- knowledge/inbox/articles.md data/raw/fastf1 data/processed models outputs/prediction.json config/race_config.json)" ]; then
            echo "No pipeline output changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- knowledge/inbox/articles.md data/raw/fastf1 data/processed models outputs/prediction.json config/race_config.json
          git commit -m "Run full F1 prediction pipeline"
          git push
