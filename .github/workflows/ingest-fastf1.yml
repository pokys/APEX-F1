name: Ingest FastF1 Data

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Season year (e.g. 2026)"
        required: false
        type: string
      sessions:
        description: "Comma-separated sessions (e.g. Q,R)"
        required: false
        type: string
      cutoff_date:
        description: "Cutoff date YYYY-MM-DD"
        required: false
        type: string
      include_lap_metrics:
        description: "Extract clean-lap pace metrics during ingest (slower)"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "40 4 * * *"
  push:
    paths:
      - "pipeline/ingest_fastf1.py"
      - "requirements.txt"
      - "requirements.lock"
      - ".github/workflows/ingest-fastf1.yml"

permissions:
  contents: write

concurrency:
  group: bot-outputs
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Run FastF1 ingest
        env:
          SEASON: ${{ github.event.inputs.season }}
          SESSIONS: ${{ github.event.inputs.sessions }}
          CUTOFF_DATE: ${{ github.event.inputs.cutoff_date }}
        run: |
          ARGS=()
          if [ -n "$SEASON" ]; then
            ARGS+=(--season "$SEASON")
          fi
          if [ -n "$SESSIONS" ]; then
            ARGS+=(--sessions "$SESSIONS")
          fi
          if [ -n "$CUTOFF_DATE" ]; then
            ARGS+=(--cutoff-date "$CUTOFF_DATE")
          fi
          if [ "${{ github.event.inputs.include_lap_metrics }}" = "true" ]; then
            ARGS+=(--include-lap-metrics)
          fi

          python pipeline/ingest_fastf1.py "${ARGS[@]}" --log-level INFO

      - name: Commit changes
        run: bash scripts/commit_bot_outputs.sh "Update FastF1 raw data snapshot" data/raw/fastf1
