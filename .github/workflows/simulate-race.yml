name: Simulate Prediction

on:
  workflow_dispatch:
    inputs:
      fixed_grid:
        description: "Comma-separated driver abbreviations (e.g. VER,RUS,LEC). Overrides auto-detection."
        required: false
        type: string
  schedule:
    - cron: "50 5 * * *"
  push:
    paths:
      - "pipeline/simulate_race.py"
      - "pipeline/simulate_weather_scenarios.py"
      - "pipeline/select_prediction_target.py"
      - "pipeline/simulate_target_prediction.py"
      - "pipeline/render_prediction_page.py"
      - "models/*.json"
      - "config/race_config.json"
      - "config/session_weights.json"
      - "data/raw/calendars/**"
      - "config/track_profiles.json"
      - ".github/workflows/simulate-race.yml"
      - "requirements.lock"

permissions:
  contents: write

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Select next GP config
        run: |
          python pipeline/select_next_gp.py --season "$(date -u +%Y)" --as-of-date "$(date -u +%F)" --raw-dir data/raw/fastf1 --calendar-cache-dir data/raw/calendars --race-config config/race_config.json --log-level INFO

      - name: Select automatic prediction target
        run: |
          python pipeline/select_prediction_target.py --race-config config/race_config.json --raw-dir data/raw/fastf1 --calendar-cache-dir data/raw/calendars --session-weights config/session_weights.json --signals-dir knowledge/processed --log-level INFO

      - name: Apply backtest calibration
        run: |
          python pipeline/apply_backtest_calibration.py --season "$(date -u +%Y)" --race-config config/race_config.json --allow-missing-report --log-level INFO

      - name: Simulate dry and wet scenarios
        env:
          FIXED_GRID: ${{ github.event.inputs.fixed_grid }}
        run: |
          ARGS=()
          if [ -n "$FIXED_GRID" ]; then
            ARGS+=(--fixed-grid "$FIXED_GRID")
          fi
          python pipeline/simulate_weather_scenarios.py "${ARGS[@]}" --raw-dir data/raw/fastf1 --allow-missing-models --log-level INFO

      - name: Publish canonical prediction
        run: |
          python pipeline/publish_prediction.py --input outputs/prediction_dry.json --output outputs/prediction_dry.json --allow-missing-input --log-level INFO
          python pipeline/publish_prediction.py --input outputs/prediction_wet.json --output outputs/prediction_wet.json --allow-missing-input --log-level INFO
          python pipeline/publish_prediction.py --allow-missing-input --log-level INFO

      - name: Render prediction page
        run: |
          python pipeline/render_prediction_page.py --prediction outputs/prediction.json --prediction-dry outputs/prediction_dry.json --prediction-wet outputs/prediction_wet.json --race-config config/race_config.json --output outputs/prediction_report.html --allow-missing-input --log-level INFO

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain -- outputs/prediction.json outputs/prediction_dry.json outputs/prediction_wet.json outputs/prediction_report.html config/race_config.json)" ]; then
            echo "No prediction changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- outputs/prediction.json outputs/prediction_dry.json outputs/prediction_wet.json outputs/prediction_report.html config/race_config.json
          git commit -m "Update prediction outputs"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "git push failed (attempt $attempt), retrying after rebase..."
              git pull --rebase || true
              sleep $((attempt * 7))
            fi
          done
          echo "git push failed after 3 attempts."
          exit 1
