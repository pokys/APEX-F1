name: Simulate Race

on:
  workflow_dispatch:
  schedule:
    - cron: "50 5 * * *"
  push:
    paths:
      - "pipeline/simulate_race.py"
      - "models/*.json"
      - "config/race_config.json"
      - ".github/workflows/simulate-race.yml"

permissions:
  contents: write

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Select next GP config
        run: |
          python pipeline/select_next_gp.py --season "$(date -u +%Y)" --as-of-date "$(date -u +%F)" --race-config config/race_config.json --log-level INFO

      - name: Simulate race
        run: |
          python pipeline/simulate_race.py --allow-missing-models --log-level INFO

      - name: Publish canonical prediction
        run: |
          python pipeline/publish_prediction.py --allow-missing-input --log-level INFO

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain -- outputs/prediction.json config/race_config.json)" ]; then
            echo "No prediction changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- outputs/prediction.json config/race_config.json
          git commit -m "Update race prediction"
          git push
