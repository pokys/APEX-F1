name: Simulate Race

on:
  workflow_dispatch:
  schedule:
    - cron: "50 5 * * *"
  push:
    paths:
      - "pipeline/simulate_race.py"
      - "pipeline/render_prediction_page.py"
      - "models/*.json"
      - "config/race_config.json"
      - "config/track_profiles.json"
      - ".github/workflows/simulate-race.yml"
      - "requirements.lock"

permissions:
  contents: write

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Select next GP config
        run: |
          python pipeline/select_next_gp.py --season "$(date -u +%Y)" --as-of-date "$(date -u +%F)" --race-config config/race_config.json --log-level INFO

      - name: Apply backtest calibration
        run: |
          python pipeline/apply_backtest_calibration.py --season "$(date -u +%Y)" --race-config config/race_config.json --allow-missing-report --log-level INFO

      - name: Simulate race
        run: |
          python pipeline/simulate_race.py --allow-missing-models --log-level INFO

      - name: Publish canonical prediction
        run: |
          python pipeline/publish_prediction.py --allow-missing-input --log-level INFO

      - name: Render prediction page
        run: |
          python pipeline/render_prediction_page.py --prediction outputs/prediction.json --race-config config/race_config.json --output outputs/prediction_report.html --allow-missing-input --log-level INFO

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain -- outputs/prediction.json outputs/prediction_report.html config/race_config.json)" ]; then
            echo "No prediction changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- outputs/prediction.json outputs/prediction_report.html config/race_config.json
          git commit -m "Update race prediction"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "git push failed (attempt $attempt), retrying after rebase..."
              git pull --rebase || true
              sleep $((attempt * 7))
            fi
          done
          echo "git push failed after 3 attempts."
          exit 1
