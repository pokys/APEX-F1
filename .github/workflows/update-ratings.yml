name: Update Ratings

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Season year (e.g. 2026)"
        required: false
        type: string
  schedule:
    - cron: "30 5 * * *"
  push:
    paths:
      - "pipeline/update_ratings.py"
      - "data/processed/**"
      - "knowledge/processed/**"
      - "config/signal_guardrails.json"
      - "requirements.lock"
      - ".github/workflows/update-ratings.yml"

permissions:
  contents: write

concurrency:
  group: bot-outputs
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Update ratings
        env:
          SEASON: ${{ github.event.inputs.season }}
        run: |
          ARGS=()
          if [ -n "$SEASON" ]; then
            ARGS+=(--season "$SEASON")
          fi
          python pipeline/validate_signals.py --signals-dir knowledge/processed --allow-empty --log-level INFO
          python pipeline/update_ratings.py "${ARGS[@]}" --guardrails-config config/signal_guardrails.json --allow-missing-features --log-level INFO

      - name: Commit changes
        run: bash scripts/commit_bot_outputs.sh "Update model ratings" models
