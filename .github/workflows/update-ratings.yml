name: Update Ratings

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Season year (e.g. 2026)"
        required: false
        type: string
  schedule:
    - cron: "30 5 * * *"
  push:
    paths:
      - "pipeline/update_ratings.py"
      - "data/processed/**"
      - "knowledge/processed/**"
      - ".github/workflows/update-ratings.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update ratings
        env:
          SEASON: ${{ github.event.inputs.season }}
        run: |
          ARGS=()
          if [ -n "$SEASON" ]; then
            ARGS+=(--season "$SEASON")
          fi
          python pipeline/update_ratings.py "${ARGS[@]}" --allow-missing-features --log-level INFO

      - name: Commit changes
        run: |
          if git diff --quiet -- models; then
            echo "No model rating changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models
          git commit -m "Update model ratings"
          git push

