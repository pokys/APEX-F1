name: Update Ratings

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Season year (e.g. 2026)"
        required: false
        type: string
  schedule:
    - cron: "30 5 * * *"
  push:
    paths:
      - "pipeline/update_ratings.py"
      - "data/processed/**"
      - "knowledge/processed/**"
      - "config/signal_guardrails.json"
      - "requirements.lock"
      - ".github/workflows/update-ratings.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Update ratings
        env:
          SEASON: ${{ github.event.inputs.season }}
        run: |
          ARGS=()
          if [ -n "$SEASON" ]; then
            ARGS+=(--season "$SEASON")
          fi
          python pipeline/validate_signals.py --signals-dir knowledge/processed --allow-empty --log-level INFO
          python pipeline/update_ratings.py "${ARGS[@]}" --guardrails-config config/signal_guardrails.json --allow-missing-features --log-level INFO

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain -- models)" ]; then
            echo "No model rating changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- models
          git commit -m "Update model ratings"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "git push failed (attempt $attempt), retrying after rebase..."
              git pull --rebase || true
              sleep $((attempt * 7))
            fi
          done
          echo "git push failed after 3 attempts."
          exit 1
